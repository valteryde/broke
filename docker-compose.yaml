# docker-compose.yml
services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  broke-server:
    restart: always
    image: ghcr.io/valteryde/broke:latest
    # To build from source instead, comment out 'image' and uncomment 'build':
    # build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - data:/data
    environment:
      - DATA_PATH=/data
      - REDIS_URL=redis://redis:6379
      - UPDATER_URL=http://broke-updater:9999
      # Optional: disable in-app updater UI/API/background checks (comma-separated ids):
      # - BROKE_DISABLED_FEATURES=updater
    depends_on:
      - redis

  broke-updater:
    build: ./updater
    restart: always
    user: "0"  # Run as root to access Docker socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - COMPOSE_PROJECT=broke
      - TARGET_SERVICE=broke-server
      - TARGET_IMAGE=ghcr.io/valteryde/broke:latest

  broke-monitor:
    restart: always
    image: ghcr.io/valteryde/broke:latest
    # To build from source instead, comment out 'image' and uncomment 'build':
    # build: .
    command: ["python", "-m", "app.monitor_worker"]
    volumes:
      - data:/data
    environment:
      - DATA_PATH=/data
      # Optional: disable monitors (comma-separated ids):
      # - BROKE_DISABLED_FEATURES=monitors
      # - MONITOR_POLL_SECONDS=10
      # - APP_BASE_URL=https://broke.example.com
    depends_on:
      - broke-server

volumes:
  data:
  redis_data:
