name: Desktop Release

on:
  workflow_run:
    workflows: ["CI - Code Quality & Tests"]
    types: [completed]

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: electron
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: broke-desktop-macos
          path: |
            electron/dist/*.dmg
            electron/dist/latest-mac.yml
            electron/dist/*.blockmap
          if-no-files-found: error

  build-win:
    name: Build Windows EXE
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: broke-desktop-windows
          path: |
            electron/dist/*.exe
            electron/dist/latest.yml
            electron/dist/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish rolling GitHub release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: broke-desktop-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: broke-desktop-windows
          path: release-assets/windows

      - name: Rename release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets/final
          mac_file=$(find release-assets/macos -maxdepth 1 -type f -name '*.dmg' | head -n 1)
          win_file=$(find release-assets/windows -maxdepth 1 -type f -name '*.exe' | head -n 1)

          cp "$mac_file" release-assets/final/broke-desktop-mac.dmg
          cp "$win_file" release-assets/final/broke-desktop-setup.exe

      - name: Move rolling release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f desktop-latest "$RELEASE_SHA"
          git push origin refs/tags/desktop-latest --force

      - name: Recreate rolling release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release delete desktop-latest --repo "$REPOSITORY" --yes --cleanup-tag || true
          git tag -f desktop-latest "$RELEASE_SHA"
          git push origin refs/tags/desktop-latest --force
          gh release create desktop-latest \
            release-assets/final/broke-desktop-mac.dmg \
            release-assets/final/broke-desktop-setup.exe \
            --repo "$REPOSITORY" \
            --target "$RELEASE_SHA" \
            --title "Desktop Latest" \
            --notes "Automated desktop build for commit $RELEASE_SHA" \
            --prerelease
